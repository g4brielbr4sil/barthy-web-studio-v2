<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="Versão editorial experimental da Barthy Web Studio, com projetos, soluções digitais e formas de contato."
    />
    <meta name="theme-color" content="#F6FAFD" />
    <script>
      ;(() => {
        const key = 'barthy-v2-theme'
        const colors = { light: '#F6FAFD', dark: '#0A1931' }
        let theme = 'light'

        try {
          const savedTheme = window.localStorage.getItem(key)
          if (savedTheme === 'light' || savedTheme === 'dark') {
            theme = savedTheme
          }
        } catch {
          theme = 'light'
        }

        const root = document.documentElement
        root.dataset.theme = theme
        root.style.colorScheme = theme
        root.style.backgroundColor = colors[theme]
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute('content', colors[theme])
      })()
    </script>
    <title>Barthy Web Studio V2 | Experiência editorial</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
